# =============================================================
# M-03 소셜 로그인 OAuth2 키 설정
# 각 개발자 콘솔에서 발급받은 값을 채워 넣으세요.
# clientId 가 비어 있는 제공자는 자동으로 비활성화됩니다(앱은 정상 기동).
#
# 콘솔에 등록할 Redirect URI (로컬 대표 도메인 기준):
#   카카오 : http://underwatch.local:8080/login/oauth2/code/kakao
#   네이버 : http://underwatch.local:8080/login/oauth2/code/naver
#   구글   : http://underwatch.local:8080/login/oauth2/code/google
# =============================================================

# --- 카카오 (REST API 키 = clientId, 콘솔 '보안'에서 Client Secret 발급) ---
oauth.kakao.client-id=
oauth.kakao.client-secret=

# --- 네이버 ---
oauth.naver.client-id=
oauth.naver.client-secret=

# --- 구글 ---
oauth.google.client-id=
oauth.google.client-secret=
